name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; new pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # `npm install` (not `npm ci`): rolldown ships per-platform binary packages whose optional
      # @emnapi/* deps float on patch versions, so a lock generated on one OS/npm can fail `npm ci`'s
      # strict whole-tree validation on the Linux runner. install resolves what the runner needs.
      - run: npm install --no-audit --no-fund
      # Build under the project sub-path so asset/manifest/SW URLs resolve on Pages.
      - run: npm run build
        env:
          DEPLOY_BASE: /decanta-water-sort/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
