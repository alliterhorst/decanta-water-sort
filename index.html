<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b1322" />
    <title>Decanta: Water Sort</title>
    <!-- Tab favicon. %BASE_URL% is swapped by Vite for the deploy base (/ locally, /decanta-water-sort/ on Pages). -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/icon-192.png" />
    <!-- iOS doesn't read the manifest for "add to home screen" — it needs these separate tags. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Decanta" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.png" />
  </head>
  <body>
    <div id="root">
      <!-- Boot loader: pure inline HTML/CSS so it shows even while the JS bundle is still
           downloading (slow networks / first PWA load). React's first render replaces the
           children of #root, which removes it automatically. -->
      <style>
        #boot { position: fixed; inset: 0; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; background: #0b1322; }
        #boot .r { width: 34px; height: 34px; border-radius: 50%; border: 3px solid #1e293b; border-top-color: #2dd4bf; animation: bootspin 0.8s linear infinite; }
        #boot .t { color: #475569; font: 600 12px/1 system-ui, sans-serif; letter-spacing: 0.34em; padding-left: 0.34em; }
        @keyframes bootspin { to { transform: rotate(360deg); } }
      </style>
      <div id="boot"><div class="r"></div><div class="t">DECANTA</div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
